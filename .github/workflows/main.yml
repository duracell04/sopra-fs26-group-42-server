name: Deploy Project to App Engine

on:
  push:
    branches:
      - main

  # run the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test:
    name: Test and Sonarqube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6

      - name: Install Java 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Test and analyze
        run: ./gradlew test jacocoTestReport sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploying to Google Cloud
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_CREDENTIALS }}

      - name: Add OpenRouter runtime environment
        run: |
          if [ -z "${OPENROUTER_API_KEY}" ]; then
            echo "::error::OPENROUTER_API_KEY GitHub secret is not set"
            exit 1
          fi

          cat >> app.yaml <<EOF

          env_variables:
            OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
            OPENROUTER_MODEL: "openrouter/free"
          EOF
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Deploy to App Engine
        id: deploy
        uses: google-github-actions/deploy-appengine@v3
        with:
          deliverables: app.yaml
          version: gh-${{ github.run_number }}-${{ github.run_attempt }}

      - name: Test deployed backend
        run: curl --fail --show-error --max-time 60 --retry 3 --retry-delay 10 "${{ steps.deploy.outputs.url }}/users"
